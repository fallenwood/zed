[build]
rustc-wrapper = "sccache"

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "symbol-mangling-version=v0", "-C", "link-arg=-fuse-ld=lld", "--cfg", "tokio_unstable"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "symbol-mangling-version=v0", "-C", "link-arg=-fuse-ld=mold", "--cfg", "tokio_unstable"]

[alias]
xtask = "run --package xtask --"
